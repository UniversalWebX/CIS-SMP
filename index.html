<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create: Industrial Skies</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap');

        :root {
            --blue: #0ea5e9;
            --white: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #1e2937 100%);
            color: var(--white);
            overflow-x: hidden;
        }

        header {
            background: rgba(15, 23, 42, 0.97);
            border-bottom: 4px solid var(--blue);
            position: fixed;
            width: 100%;
            z-index: 1000;
            padding: 1.2rem 0;
        }

        .nav {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--blue);
        }

        .hero {
            min-height: 100vh;
            background:
                linear-gradient(rgba(15, 23, 42, 0.82), rgba(15, 23, 42, 0.9)),
                url('https://images.unsplash.com/photo-1585208798174-6cedd78e0198?ixlib=rb-4.0.3&auto=format&fit=crop&q=80')
                center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .hero-content {
            max-width: 900px;
        }

        .hero h1 {
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -2px;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .ip-box {
            background: rgba(30, 41, 59, 0.95);
            border: 3px solid var(--blue);
            padding: 1.4rem 3rem;
            border-radius: 14px;
            display: inline-block;
            margin: 2rem 0;
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--white);
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.2);
        }

        .btn {
            display: inline-block;
            background: var(--blue);
            color: white;
            padding: 16px 42px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.05rem;
            text-decoration: none;
            transition: 0.25s ease;
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 28px rgba(14, 165, 233, 0.35);
        }

        .discord-section {
            padding: 100px 2rem;
            display: flex;
            justify-content: center;
        }

        .discord-widget {
            background: #1e2937;
            padding: 1rem;
            border-radius: 18px;
            border: 3px solid var(--blue);
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.15);
        }

        footer {
            background: #0f172a;
            text-align: center;
            padding: 2rem;
            border-top: 2px solid rgba(255,255,255,0.08);
            color: #94a3b8;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 3rem;
            }

            .ip-box {
                font-size: 1.1rem;
                padding: 1rem 1.5rem;
                letter-spacing: 1px;
            }

            .btn {
                width: 100%;
                max-width: 300px;
            }

            .discord-widget iframe {
                width: 100%;
                max-width: 350px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="nav">
            <div class="logo">
                CREATE <span>INDUSTRIAL SKIES</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>INDUSTRIAL SKIES</h1>

            <p>
                A Create-powered industrial survival experience.
            </p>

            <div class="ip-box">
                great-wilderness.gl.joinmc.link
            </div>

            <br />

            <a href="#discord" class="btn">
                JOIN DISCORD
            </a>
        </div>
    </section>

    <section class="discord-section" id="discord">
        <div class="discord-widget">
            <iframe
                src="https://discord.com/widget?id=1506433862790811800&theme=dark"
                width="350"
                height="500"
                allowtransparency="true"
                frameborder="0"
                sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
            </iframe>
        </div>
    </section>

    <footer>
        <p>&copy; Create: Industrial Skies</p>
    </footer>

</body>
</html>
